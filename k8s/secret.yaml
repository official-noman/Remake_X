apiVersion: v1
kind: Secret
metadata:
  name: remake-secret
  namespace: remake-x
type: Opaque
stringData:
  # Fill via: kubectl create secret generic remake-secret --from-env-file=.env.prod -n remake-x
  DATABASE_URL: "postgres://user:password@db-host:5432/dbname"
  SECRET_KEY: "placeholder-secret-key"
  ODOO_URL: "http://odoo.local"
  ODOO_DB: "odoo"
  ODOO_USERNAME: "admin"
  ODOO_PASSWORD: "adminpassword"

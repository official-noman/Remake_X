<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment Cancelled — Remake_X</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'DM Sans',sans-serif;background:#e8f5ee;min-height:100vh;display:flex;flex-direction:column}
    header{background:#1e6641;padding:18px 32px}
    .logo{font-family:'DM Serif Display',serif;font-size:22px;color:#fff}
    .logo span{color:#7edc9e}
    .page{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
    .card{background:#fff;border-radius:20px;box-shadow:0 8px 40px rgba(30,102,65,.13);padding:52px 48px;max-width:480px;width:100%;text-align:center}
    .icon-wrap{width:80px;height:80px;background:#fff0f0;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 24px}
    h1{font-family:'DM Serif Display',serif;font-size:30px;color:#1a2e1e;margin-bottom:10px}
    p{color:#5a7060;font-size:15px;line-height:1.6;margin-bottom:24px}
    .btn{display:inline-block;padding:14px 28px;border-radius:10px;text-decoration:none;font-weight:600;font-size:15px;margin:6px;transition:background .2s}
    .btn-primary{background:#28a745;color:#fff}
    .btn-primary:hover{background:#218838}
    .btn-outline{background:#fff;color:#1e6641;border:2px solid #1e6641}
    .btn-outline:hover{background:#f0f9f3}
  </style>
</head>
<body>
  <header><span class="logo">Remake<span>_X</span></span></header>
  <div class="page">
    <div class="card">
      <div class="icon-wrap">
        <svg width="38" height="38" fill="none" stroke="#e74c3c" stroke-width="2.5" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
        </svg>
      </div>
      <h1>Payment Cancelled</h1>
      <p>No worries — your cart has been saved.<br>Come back whenever you're ready.</p>
      <div>
        <a href="/cart/" class="btn btn-primary">Return to Cart</a>
        <a href="/explore/" class="btn btn-outline">Keep Browsing</a>
      </div>
    </div>
  </div>
</body>
</html>
